<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Gradiente Oro-Escarlata (El Lujo y La Pasión) -->
    <linearGradient id="goldFire" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFB800"/>
      <stop offset="100%" stop-color="#FF2A2A"/>
    </linearGradient>
    <!-- Glow Cian (La Mente / Ingeniería) -->
    <filter id="cyanGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Sombra de profundidad -->
    <filter id="depth">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Base OLED Black con esquinas premium -->
  <rect width="100" height="100" rx="18" fill="#050505"/>

  <!-- Borde exterior doble: Oro sutil -->
  <rect x="3" y="3" width="94" height="94" rx="15" fill="none" stroke="url(#goldFire)" stroke-width="1.5" opacity="0.5"/>

  <!-- Borde interior: Cian Láser imperceptible -->
  <rect x="8" y="8" width="84" height="84" rx="12" fill="none" stroke="#00F0FF" stroke-width="0.5" opacity="0.25"/>

  <!-- Detalle: línea de circuito diagonal (firma técnica) -->
  <line x1="12" y1="88" x2="25" y2="75" stroke="#00F0FF" stroke-width="0.8" opacity="0.3"/>
  <circle cx="12" cy="88" r="1.5" fill="#00F0FF" opacity="0.4"/>

  <line x1="88" y1="12" x2="75" y2="25" stroke="#FFB800" stroke-width="0.8" opacity="0.3"/>
  <circle cx="88" cy="12" r="1.5" fill="#FFB800" opacity="0.4"/>

  <!-- Monograma "DS." con peso y presencia -->
  <text x="50" y="68" font-family="'Outfit', 'Arial Black', sans-serif" font-size="48" font-weight="900" letter-spacing="-3" fill="white" text-anchor="middle" filter="url(#depth)">DS<tspan fill="url(#goldFire)" font-size="52">.</tspan></text>

  <!-- Línea base bajo el texto (estabilidad arquitectónica) -->
  <line x1="22" y1="76" x2="78" y2="76" stroke="url(#goldFire)" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
</svg>